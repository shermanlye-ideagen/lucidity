name: Perf Pipeline
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]
jobs:
  gate:
    name: Check Standard Pipeline
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Standard Pipeline passed — triggering Perf Pipeline"
  perf:
    needs: gate
    uses: shermanlye-ideagen/demo-cicd-platform/.github/workflows/perf-pipeline.yaml@main
    with:
      product_name: "lucidity"
    secrets: inherit
