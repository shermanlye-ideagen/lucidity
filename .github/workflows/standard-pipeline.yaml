name: "Standard Pipeline: Lucidity"
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    name: "Build (PHP 8.2)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Validate PHP
        run: php -l src/index.php

  test:
    name: "Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Run tests
        run: echo "All tests passed"

  sast-scan:
    name: "SAST Scan (SonarQube)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST analysis
        run: |
          echo "Running SonarQube SAST scan..."
          echo "Coverage floor: 0% (bronze tier)"
          echo "SAST scan passed"

  sbom:
    name: "SBOM Generation"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        run: echo "SBOM generated: sbom-lucidity.json"

  security-verify:
    name: "Security Verification"
    needs: [sast-scan, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Verify security gates
        run: echo "All security gates passed"

  container-push:
    name: "Container Build & Push"
    needs: [test, security-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and push
        run: echo "Container lucidity:${{ github.sha }} pushed to ECR"

  ai-review:
    name: "AI Code Review (Claude)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: shermanlye-ideagen/demo-cicd-platform
          path: platform
          sparse-checkout: |
            config/
            scripts/ai-review.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python platform/scripts/ai-review.py \
            --diff /tmp/pr-diff.txt --product "lucidity" \
            --standards platform/config/platform-standards.yaml \
            --boundaries platform/config/conventions/self-service-boundaries.yaml
      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/ai-review-output.md
