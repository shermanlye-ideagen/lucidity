name: CI Pipeline
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Validate
        run: php -l src/index.php
      - name: Test
        run: echo "Tests passed"
