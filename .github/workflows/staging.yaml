name: Staging Pipeline
on:
  workflow_run:
    workflows: ["Perf Pipeline"]
    types: [completed]
    branches: [main]
jobs:
  gate:
    name: Check Perf Pipeline
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Perf Pipeline passed — triggering Staging Pipeline"
  staging:
    needs: gate
    uses: shermanlye-ideagen/demo-cicd-platform/.github/workflows/staging-pipeline.yaml@main
    with:
      product_name: "lucidity"
    secrets: inherit
